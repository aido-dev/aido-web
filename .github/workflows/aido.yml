# Aido — remote install (single file)
#
# Runs Aido from the pinned aido-dev/aido release; no scripts to copy.
# This repo uses Gemini only, so just GEMINI_API_KEY is wired below — add
# CHATGPT_API_KEY / CLAUDE_API_KEY here (and as secrets) to enable those.
#
# To upgrade Aido, bump the tag in BOTH places below (`uses:` and `aido_ref:`).
# To customize a command, add a config file at
# .github/scripts/<command>/aido-<command>-config.json — it overrides the
# shipped defaults (see aido-dev/aido's .github/scripts/ for the format).

name: Aido

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  aido:
    # Cheap pre-filter: only spin up the dispatcher for `aido ...` comments.
    if: startsWith(github.event.comment.body, 'aido')
    uses: aido-dev/aido/.github/workflows/aido-dispatch.yml@v1.2.1
    with:
      aido_ref: v1.2.1
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
